<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AmbulanMu Seyegan</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
    <h2>AmbulanMu Seyegan</h2>
    <p class="subtitle">Form Permohonan Layanan Ambulans</p>

    <div class="pilihan">
        <input type="radio" id="pasienRadio" name="layanan" onclick="pilihForm('pasien')">
        <label for="pasienRadio">Pasien</label>

        <input type="radio" id="jenazahRadio" name="layanan" onclick="pilihForm('jenazah')">
        <label for="jenazahRadio">Jenazah</label>
    </div>

    <!-- FORM PASIEN -->
    <div id="pasien" class="form">
        <div class="tanggal-group">
            <select id="hari1" class="hari-select">
                <option value="">Hari</option>
                <option value="Senin">Senin</option>
                <option value="Selasa">Selasa</option>
                <option value="Rabu">Rabu</option>
                <option value="Kamis">Kamis</option>
                <option value="Jumat">Jumat</option>
                <option value="Sabtu">Sabtu</option>
                <option value="Minggu">Minggu</option>
            </select>
            
            <input id="tanggal1" type="number" min="1" max="31" placeholder="Tgl" class="tanggal-input">
            
            <select id="bulan1" class="bulan-select">
                <option value="">Bulan</option>
                <!-- Diisi otomatis JS -->
            </select>
            
            <input id="tahun1" type="number" min="2024" max="2026" placeholder="Thn" class="tahun-input">
            <small class="tanggal-hint">Tahun 2024-2026</small>
        </div>

        <input id="nama1" placeholder="Nama Pasien">
        <input id="usia1" type="number" min="0" max="120" placeholder="Usia (tahun)">
        
        <select id="kondisi">
            <option value="">Kondisi Pasien</option>
            <option value="Duduk">Duduk</option>
            <option value="Berbaring">Berbaring</option>
        </select>
        
        <input id="penyakit" placeholder="Penyakit/Keluhan">
        
        <select id="tbc">
            <option value="">Apakah TBC?</option>
            <option value="Ya">Ya</option>
            <option value="Tidak">Tidak</option>
        </select>

        <div class="lokasi-group">
            <input id="sherlock" placeholder="Sherlock Rumah - Copy dari Google Maps" readonly>
            <button type="button" class="btn-lokasi" onclick="bukaMap('sherlock')">📱 Buka Google Maps</button>
        </div>

        <textarea id="alamatAntar1" placeholder="Alamat Tujuan Antar"></textarea>
        
        <div class="jam-group">
            <input id="jam1" type="time" >
            <small class="jam-hint">Jam permintaan layanan</small>
        </div>
        
        <input id="pendamping" type="number" min="0" max="10" placeholder="Jumlah Pendamping (0-10)">
        <input id="kontak1" placeholder="Kontak HP/WA (WAJIB*)">

        <button onclick="kirim('pasien')">🚀 Kirim Permintaan</button>
    </div>

    <!-- FORM JENAZAH -->
    <div id="jenazah" class="form">
        <div class="tanggal-group">
            <select id="hari2" class="hari-select">
                <option value="">Hari</option>
                <option value="Senin">Senin</option>
                <option value="Selasa">Selasa</option>
                <option value="Rabu">Rabu</option>
                <option value="Kamis">Kamis</option>
                <option value="Jumat">Jumat</option>
                <option value="Sabtu">Sabtu</option>
                <option value="Minggu">Minggu</option>
            </select>
            
            <input id="tanggal2" type="number" min="1" max="31" placeholder="Tgl" class="tanggal-input">
            
            <select id="bulan2" class="bulan-select">
                <option value="">Bulan</option>
                <!-- Diisi otomatis JS -->
            </select>
            
            <input id="tahun2" type="number" min="2024" max="2026" placeholder="Thn" class="tahun-input">
            <small class="tanggal-hint">Tahun 2024-2026</small>
        </div>

        <input id="nama2" placeholder="Nama Almarhum/Almarhumah">
        <input id="usia2" type="number" min="0" max="120" placeholder="Usia (tahun)">

        <div class="lokasi-group">
            <input id="maps" placeholder="Lokasi Map - Copy dari Google Maps" readonly>
            <button type="button" class="btn-lokasi" onclick="bukaMap('maps')">📱 Buka Google Maps</button>
        </div>

        <textarea id="alamatAntar2" placeholder="Alamat Tujuan Antar"></textarea>
        
        <div class="jam-group">
            <input id="jam2" type="time" >
            <small class="jam-hint">Jam permintaan layanan</small>
        </div>
        
        <input id="kontak2" placeholder="Kontak HP/WA (WAJIB*)">
        <input id="sakit" placeholder="Sakit sebelum meninggal">
        <input id="peti" placeholder="Peti mati (Ya/Tidak))">

        <button onclick="kirim('jenazah')">🚀 Kirim Permintaan</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
