<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AmbulanMu Seyegan</title>

<link rel="stylesheet" href="style.css">

<!-- Leaflet (Map) -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
</head>

<body>

<div class="container">
    <h2>AmbulanMu Seyegan</h2>
    <p class="subtitle">Form Permohonan Layanan Ambulans</p>

    <div class="pilihan">
        <input type="radio" id="pasienRadio" name="layanan" onclick="pilihForm('pasien')">
        <label for="pasienRadio">Pasien</label>

        <input type="radio" id="jenazahRadio" name="layanan" onclick="pilihForm('jenazah')">
        <label for="jenazahRadio">Jenazah</label>
    </div>

    <!-- FORM PASIEN -->
    <div id="pasien" class="form">
        <!-- PILIH HARI -->
        <select id="hari1">
            <option value="">Pilih Hari</option>
            <option value="Senin">Senin</option>
            <option value="Selasa">Selasa</option>
            <option value="Rabu">Rabu</option>
            <option value="Kamis">Kamis</option>
            <option value="Jumat">Jumat</option>
            <option value="Sabtu">Sabtu</option>
            <option value="Minggu">Minggu</option>
        </select>
        
        <input id="tanggal1" type="number" min="1" max="31" placeholder="Tanggal (1-31)">
        <select id="bulan1">
            <option value="">Pilih Bulan</option>
            <option value="Januari">Januari</option>
            <option value="Februari">Februari</option>
            <option value="Maret">Maret</option>
            <option value="April">April</option>
            <option value="Mei">Mei</option>
            <option value="Juni">Juni</option>
            <option value="Juli">Juli</option>
            <option value="Agustus">Agustus</option>
            <option value="September">September</option>
            <option value="Oktober">Oktober</option>
            <option value="November">November</option>
            <option value="Desember">Desember</option>
        </select>
        <input id="tahun1" type="number" min="2024" max="2030" placeholder="Tahun (2024-2030)">

        <input id="nama1" placeholder="Nama Pasien">
        <input id="usia1" type="number" min="0" max="120" placeholder="Usia">
        <input id="kondisi" placeholder="Kondisi (duduk/berbaring)">
        <input id="penyakit" placeholder="Penyakit">
        <input id="tbc" placeholder="TBC (Ya/Tidak)">

        <input id="sherlock" placeholder="Sherlock Rumah" readonly>
        <button type="button" class="btn-lokasi" onclick="bukaMap('sherlock')">📍 Pilih di Map</button>

        <textarea id="alamatAntar1" placeholder="Alamat Antar"></textarea>
        <input id="jam1" type="time">
        <input id="pendamping" type="number" min="0" max="10" placeholder="Jumlah Pendamping">
        <input id="kontak1" placeholder="Kontak HP/WA">

        <button onclick="kirim('pasien')">Kirim ke WhatsApp</button>
    </div>

    <!-- FORM JENAZAH -->
    <div id="jenazah" class="form">
        <!-- PILIH HARI -->
        <select id="hari2">
            <option value="">Pilih Hari</option>
            <option value="Senin">Senin</option>
            <option value="Selasa">Selasa</option>
            <option value="Rabu">Rabu</option>
            <option value="Kamis">Kamis</option>
            <option value="Jumat">Jumat</option>
            <option value="Sabtu">Sabtu</option>
            <option value="Minggu">Minggu</option>
        </select>
        
        <input id="tanggal2" type="number" min="1" max="31" placeholder="Tanggal (1-31)">
        <select id="bulan2">
            <option value="">Pilih Bulan</option>
            <option value="Januari">Januari</option>
            <option value="Februari">Februari</option>
            <option value="Maret">Maret</option>
            <option value="April">April</option>
            <option value="Mei">Mei</option>
            <option value="Juni">Juni</option>
            <option value="Juli">Juli</option>
            <option value="Agustus">Agustus</option>
            <option value="September">September</option>
            <option value="Oktober">Oktober</option>
            <option value="November">November</option>
            <option value="Desember">Desember</option>
        </select>
        <input id="tahun2" type="number" min="2024" max="2030" placeholder="Tahun (2024-2030)">

        <input id="nama2" placeholder="Nama">
        <input id="usia2" type="number" min="0" max="120" placeholder="Usia">

        <input id="maps" placeholder="Lokasi Map" readonly>
        <button type="button" class="btn-lokasi" onclick="bukaMap('maps')">📍 Pilih di Map</button>

        <textarea id="alamatAntar2" placeholder="Alamat Antar"></textarea>
        <input id="jam2" type="time">
        <input id="kontak2" placeholder="Kontak HP/WA">
        <input id="sakit" placeholder="Sakit sebelum meninggal">
        <input id="peti" placeholder="Peti/Tidak">

        <button onclick="kirim('jenazah')">Kirim ke WhatsApp</button>
    </div>
</div>

<!-- MODAL MAP -->
<div id="mapModal" class="modal">
    <div class="modal-content">
        <div id="map"></div>
        <button onclick="tutupMap()">Selesai</button>
    </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="script.js"></script>

</body>
</html>
